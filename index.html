<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Hearts Couro — Seu Pedido</title>
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Segoe UI',sans-serif;background:#f5f0eb;min-height:100vh;padding-bottom:100px}
    header{background:#6b3a2a;color:#fff;text-align:center;padding:22px 16px 18px}
    header h1{font-size:1.6rem;letter-spacing:1px}
    header p{font-size:.85rem;opacity:.8;margin-top:4px}
    .container{max-width:520px;margin:0 auto;padding:20px 16px}
    .sec-title{font-size:.75rem;font-weight:700;color:#9e7060;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px}
    .card{background:#fff;border-radius:16px;padding:18px;box-shadow:0 1px 8px rgba(0,0,0,.07);margin-bottom:16px}
    .card h3{font-size:.95rem;color:#6b3a2a;font-weight:700;margin-bottom:14px}
    /* itens */
    .oi{display:flex;align-items:center;gap:12px;padding:12px;background:#fdf6f0;border-radius:12px;margin-bottom:8px}
    .oi-emoji{width:46px;height:46px;background:#ede0d4;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:1.4rem;flex-shrink:0}
    .oi-info{flex:1}
    .oi-info strong{font-size:.92rem;color:#333;display:block}
    .oi-info .oi-sub{font-size:.78rem;color:#9e7060;margin-top:1px}
    .oi-info .oi-preco{font-size:.9rem;font-weight:700;color:#6b3a2a;margin-top:4px}
    .oi-qtd{font-size:.82rem;color:#9e7060;background:#ede0d4;padding:2px 8px;border-radius:20px;margin-top:4px;display:inline-block}
    .btn-rm{background:none;border:1.5px solid #f5c6c6;color:#c0392b;font-size:.78rem;font-weight:700;cursor:pointer;padding:6px 12px;border-radius:8px;transition:all .2s;white-space:nowrap}
    .btn-rm:hover{background:#fde8e4;border-color:#c0392b}
    /* frete escolhido */
    .frete-box{background:#f0faf4;border:1.5px solid #a8d5b5;border-radius:12px;padding:14px;display:flex;justify-content:space-between;align-items:center}
    .frete-box .fb-nome{font-weight:700;font-size:.9rem;color:#1b5e20}
    .frete-box .fb-prazo{font-size:.76rem;color:#2e7d32;margin-top:2px}
    .frete-box .fb-preco{font-weight:700;color:#1b5e20;font-size:.95rem;white-space:nowrap}
    /* frete seleção */
    .btn-frete-op{width:100%;padding:13px 14px;border:1.5px solid #e0d4c8;border-radius:12px;background:#fff;font-size:.9rem;font-weight:600;color:#333;cursor:pointer;text-align:left;display:flex;align-items:center;gap:12px;transition:all .2s;margin-bottom:8px;font-family:inherit}
    .btn-frete-op:hover{border-color:#6b3a2a;background:#fdf6f0}
    .btn-frete-op .bfo-icon{font-size:1.3rem;flex-shrink:0}
    .btn-frete-op small{font-weight:400;color:#9e7060;display:block;margin-top:2px;font-size:.78rem}
    .cep-row{display:flex;gap:8px;margin-top:10px}
    .cep-row input{flex:1;border:1.5px solid #e0d4c8;border-radius:10px;padding:10px 12px;font-size:.9rem;color:#333;outline:none;transition:border-color .2s;font-family:inherit}
    .cep-row input:focus{border-color:#6b3a2a}
    .btn-calc-sm{padding:10px 16px;border:none;border-radius:10px;background:#6b3a2a;color:#fff;font-size:.85rem;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit}
    .btn-calc-sm:disabled{opacity:.5;cursor:default}
    .frete-op{border:1.5px solid #e0d4c8;border-radius:10px;padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:all .2s;display:flex;justify-content:space-between;align-items:center}
    .frete-op:hover{border-color:#6b3a2a;background:#fdf6f0}
    .frete-op .fo-nome{font-size:.88rem;font-weight:700;color:#333}
    .frete-op .fo-prazo{font-size:.74rem;color:#9e7060;margin-top:2px}
    .frete-op .fo-preco{font-weight:700;color:#6b3a2a;font-size:.9rem;white-space:nowrap}
    .trocar-frete{background:none;border:none;color:#9e7060;font-size:.75rem;cursor:pointer;text-decoration:underline;margin-top:8px;display:inline-block;padding:0;font-family:inherit}
    /* resumo */
    .sum-linha{display:flex;justify-content:space-between;font-size:.88rem;color:#555;margin-bottom:8px}
    .sum-total{display:flex;justify-content:space-between;font-size:1.15rem;font-weight:700;color:#6b3a2a;border-top:1.5px solid #eee;padding-top:10px;margin-top:4px}
    /* botões */
    .btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;padding:15px;border:none;border-radius:14px;font-size:1rem;font-weight:700;cursor:pointer;transition:opacity .2s,transform .1s;font-family:inherit;margin-top:10px}
    .btn:active{transform:scale(.98)}.btn:hover{opacity:.9}.btn:disabled{opacity:.5;cursor:default}
    .btn-mp{background:#009ee3;color:#fff}
    .btn-wpp{background:#25d366;color:#fff}
    /* aviso */
    .warn{background:#fff8e1;border:1.5px solid #ffe082;border-radius:10px;padding:10px 14px;font-size:.8rem;color:#7b6000;margin-bottom:12px;line-height:1.5}
    /* estado vazio / erro */
    .page-msg{text-align:center;padding:60px 20px}
    .page-msg .pm-icon{font-size:3rem;margin-bottom:12px}
    .page-msg p{color:#9e7060;font-size:.9rem;line-height:1.6}
    /* spinner */
    .spin{display:inline-block;width:16px;height:16px;border:2.5px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:spin .6s linear infinite}
    @keyframes spin{to{transform:rotate(360deg)}}
    /* toast */
    .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(80px);background:#27ae60;color:#fff;padding:10px 22px;border-radius:40px;font-weight:700;font-size:.85rem;box-shadow:0 4px 16px rgba(0,0,0,.15);transition:transform .3s;z-index:999;white-space:nowrap}
    .toast.show{transform:translateX(-50%) translateY(0)}
  </style>
</head>
<body>

<header>
  <h1>Hearts Couro</h1>
  <p id="hdr-sub">Seu pedido</p>
</header>

<div class="container" id="page-content">
  <div class="page-msg"><div class="pm-icon">&#9203;</div><p>Carregando pedido...</p></div>
</div>

<div class="toast" id="toast"></div>

<script>
// ── utils ──────────────────────────────────────────────────
function toast(msg, cor) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = cor || '#27ae60';
  t.classList.add('show'); setTimeout(() => t.classList.remove('show'), 2800);
}
function brl(v) { return 'R$ ' + Number(v).toFixed(2).replace('.', ','); }
function decodeData(str) { return JSON.parse(decodeURIComponent(escape(atob(str)))); }
function maskCep(el) {
  let v = el.value.replace(/\D/g,'').slice(0,8);
  if (v.length > 5) v = v.slice(0,5) + '-' + v.slice(5);
  el.value = v;
}

// ── estado ─────────────────────────────────────────────────
let ORDER    = null;
let items    = [];
let frete    = null;
let wppAdmin = '';
let modified = false;

// ── parse URL ──────────────────────────────────────────────
function parseUrl() {
  const m = location.hash.match(/[#&]pedido=([^&]+)/);
  if (!m) return null;
  try { return decodeData(m[1]); } catch(e) { return null; }
}

// ── página ─────────────────────────────────────────────────
function renderPage() {
  ORDER = parseUrl();
  const el = document.getElementById('page-content');

  if (!ORDER || !ORDER.items) {
    el.innerHTML = `<div class="page-msg"><div class="pm-icon">&#128533;</div><p>Link de pedido inválido ou expirado.<br/>Entre em contato pelo WhatsApp.</p></div>`;
    return;
  }

  items    = ORDER.items.map(i => ({...i}));
  frete    = ORDER.frete || null;
  wppAdmin = ORDER.wpp_admin || '';

  if (ORDER.cliente) {
    document.getElementById('hdr-sub').textContent = 'Pedido de ' + ORDER.cliente;
  }

  buildPage(el);
}

function buildPage(el) {
  el.innerHTML = `
    <div class="sec-title">Itens do seu pedido</div>
    <div id="oi-list"></div>

    <div class="card">
      <h3>Entrega</h3>
      <div id="frete-inner"></div>
    </div>

    <div class="card">
      <div class="sum-linha"><span id="r-qtd-label">Itens</span><span id="r-sub"></span></div>
      <div class="sum-linha" id="r-frete-linha" style="display:none">
        <span id="r-frete-lbl">Frete</span>
        <span id="r-frete-val"></span>
      </div>
      <div class="sum-total"><span>Total</span><span id="r-total"></span></div>
    </div>

    <div id="warn-mod" style="display:none" class="warn">
      &#9999;&#65039; Você removeu um item. Clique em pagar para confirmar o valor atualizado.
    </div>

    <div id="pag-area"></div>
  `;

  renderItems();
  renderFrete();
  updateResumo();
}

// ── itens ──────────────────────────────────────────────────
function renderItems() {
  const el = document.getElementById('oi-list');
  if (!el) return;

  if (!items.length) {
    el.innerHTML = `<div class="warn">Todos os itens foram removidos. Entre em contato pelo WhatsApp se precisar de ajuda.</div>`;
    return;
  }

  el.innerHTML = items.map((item, i) => `
    <div class="oi">
      <div class="oi-emoji">&#128156;</div>
      <div class="oi-info">
        <strong>${item.nome}</strong>
        ${item.cor ? `<div class="oi-sub">${item.cor}</div>` : ''}
        <div class="oi-preco">${brl(item.preco * item.qtd)}</div>
        ${item.qtd > 1 ? `<span class="oi-qtd">${item.qtd} unidades</span>` : ''}
      </div>
      <button class="btn-rm" onclick="removerItem(${i})">Remover</button>
    </div>`).join('');
}

function removerItem(i) {
  items.splice(i, 1);
  modified = true;
  const w = document.getElementById('warn-mod');
  if (w) w.style.display = 'block';
  renderItems();
  updateResumo();
}

// ── frete ──────────────────────────────────────────────────
function renderFrete() {
  const el = document.getElementById('frete-inner');
  if (!el) return;

  if (frete) {
    el.innerHTML = `
      <div class="frete-box">
        <div>
          <div class="fb-nome">${frete.servico}${frete.empresa ? ' &middot; ' + frete.empresa : ''}</div>
          ${frete.prazo ? `<div class="fb-prazo">${frete.prazo}</div>` : ''}
        </div>
        <div class="fb-preco">${frete.preco > 0 ? brl(frete.preco) : 'Gr&aacute;tis'}</div>
      </div>
      ${!ORDER.frete ? `<button class="trocar-frete" onclick="trocarFrete()">Trocar opção de entrega</button>` : ''}
    `;
    return;
  }

  el.innerHTML = `
    <div id="frete-sel-area">
      <button class="btn-frete-op" onclick="escolherRetirada()">
        <span class="bfo-icon">&#127978;</span>
        <div><strong>Retirar na loja</strong><small>Gr&aacute;tis &middot; Combinar hor&aacute;rio</small></div>
      </button>
      <button class="btn-frete-op" id="btn-op-correios" onclick="mostrarCep()">
        <span class="bfo-icon">&#128666;</span>
        <div><strong>Entrega pelos Correios</strong><small>PAC ou SEDEX &mdash; informe seu CEP</small></div>
      </button>
      <div id="cep-area" style="display:none;margin-top:4px">
        <div class="cep-row">
          <input type="text" id="cep-input" placeholder="00000-000" maxlength="9" oninput="maskCep(this)" inputmode="numeric"/>
          <button class="btn-calc-sm" id="btn-calc-frete" onclick="calcularFrete()">Calcular</button>
        </div>
        <div id="frete-resultados" style="margin-top:10px"></div>
      </div>
    </div>
  `;
}

function escolherRetirada() {
  frete = { servico: 'Retirada na loja', empresa: '', preco: 0, prazo: 'Combinar horário' };
  renderFrete();
  updateResumo();
}

function mostrarCep() {
  const btn = document.getElementById('btn-op-correios');
  const area = document.getElementById('cep-area');
  if (btn) btn.style.display = 'none';
  if (area) area.style.display = 'block';
}

async function calcularFrete() {
  const input = document.getElementById('cep-input');
  const cep = input ? input.value.replace(/\D/g, '') : '';
  if (cep.length !== 8) { toast('CEP inválido', '#e74c3c'); return; }

  const btn = document.getElementById('btn-calc-frete');
  if (btn) { btn.disabled = true; btn.innerHTML = '<span class="spin"></span>'; }

  try {
    const res = await fetch('/api/frete', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ cep_destino: cep })
    });
    const data = await res.json();
    if (data.erro) throw new Error(data.erro);

    const ops = Array.isArray(data) ? data.filter(o =>
      !o.error && o.price && /^(PAC|SEDEX)/i.test(o.name)
    ) : [];

    if (!ops.length) throw new Error('PAC e SEDEX não disponíveis para esse CEP.');

    renderOpcoesCorreios(ops);
  } catch(e) {
    toast(e.message, '#e74c3c');
  } finally {
    if (btn) { btn.disabled = false; btn.textContent = 'Calcular'; }
  }
}

function renderOpcoesCorreios(ops) {
  window._freteOps = ops;
  const el = document.getElementById('frete-resultados');
  if (!el) return;
  el.innerHTML = ops.map((o, i) => `
    <div class="frete-op" onclick="selecionarCorreios(${i})">
      <div>
        <div class="fo-nome">${o.name}</div>
        <div class="fo-prazo">${o.delivery_time} dias &uacute;teis</div>
      </div>
      <div class="fo-preco">${brl(o.price)}</div>
    </div>`).join('');
}

function selecionarCorreios(i) {
  const o = window._freteOps[i];
  frete = {
    servico: o.name,
    empresa: o.company?.name || 'Correios',
    preco: parseFloat(o.price),
    prazo: o.delivery_time + ' dias úteis'
  };
  renderFrete();
  updateResumo();
}

function trocarFrete() {
  frete = null;
  renderFrete();
  updateResumo();
}

// ── resumo ─────────────────────────────────────────────────
function updateResumo() {
  const sub   = items.reduce((s, i) => s + i.preco * i.qtd, 0);
  const total = sub + (frete ? frete.preco : 0);
  const qtd   = items.reduce((s, i) => s + i.qtd, 0);

  const lbl = document.getElementById('r-qtd-label');
  if (lbl) lbl.textContent = `${qtd} ${qtd === 1 ? 'item' : 'itens'}`;
  const subEl = document.getElementById('r-sub');
  if (subEl) subEl.textContent = brl(sub);
  const totEl = document.getElementById('r-total');
  if (totEl) totEl.textContent = brl(total);

  const freteLinha = document.getElementById('r-frete-linha');
  if (freteLinha) {
    if (frete) {
      freteLinha.style.display = '';
      const lbl2 = document.getElementById('r-frete-lbl');
      const val  = document.getElementById('r-frete-val');
      if (lbl2) lbl2.textContent = frete.servico === 'Retirada na loja' ? 'Retirada na loja' : `Frete (${frete.servico})`;
      if (val)  val.textContent  = frete.preco > 0 ? brl(frete.preco) : 'Grátis';
    } else {
      freteLinha.style.display = 'none';
    }
  }

  renderPagArea(total);
}

// ── pagamento ──────────────────────────────────────────────
function renderPagArea(total) {
  const el = document.getElementById('pag-area');
  if (!el) return;

  if (!items.length) {
    el.innerHTML = `
      <button class="btn btn-wpp" onclick="confirmarWpp()">
        &#128740; Falar pelo WhatsApp
      </button>`;
    return;
  }

  if (!frete) {
    el.innerHTML = `
      <div class="warn" style="text-align:center;margin-bottom:0">
        &#9757;&#65039; Escolha uma opção de entrega acima para continuar.
      </div>`;
    return;
  }

  el.innerHTML = `
    <button class="btn btn-mp" id="btn-pagar" onclick="pagar()">
      <svg width="20" height="20" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="24" fill="#fff" fill-opacity=".25"/><path d="M12 26c4-8 20-8 24 0" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg>
      Pagar com Mercado Pago
    </button>`;
}

async function pagar() {
  if (!items.length || !frete) return;

  const btn = document.getElementById('btn-pagar');
  btn.disabled = true;
  btn.innerHTML = '<span class="spin"></span> Aguarde...';

  try {
    // Usa link pré-gerado apenas se o frete já veio do admin (formato antigo)
    if (!modified && ORDER.mp_link && ORDER.frete) {
      window.open(ORDER.mp_link, '_blank');
      btn.disabled = false;
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="24" fill="#fff" fill-opacity=".25"/><path d="M12 26c4-8 20-8 24 0" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg> Pagar com Mercado Pago';
      return;
    }

    const mpItems = items.map(i => ({
      id: String(i.id),
      title: i.nome + (i.cor ? ' - ' + i.cor : ''),
      quantity: i.qtd,
      unit_price: i.preco,
      currency_id: 'BRL'
    }));

    if (frete && frete.preco > 0) {
      mpItems.push({ id: 'frete', title: 'Frete - ' + frete.servico, quantity: 1, unit_price: frete.preco, currency_id: 'BRL' });
    }

    const res = await fetch('/api/mp/preferencia', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ items: mpItems, nome_cliente: ORDER.cliente || 'Cliente' })
    });

    const data = await res.json();
    if (data.erro) throw new Error(data.erro);

    window.open(data.mp_link, '_blank');
  } catch(e) {
    toast('Erro ao gerar pagamento. Confirme pelo WhatsApp.', '#e74c3c');
    const el = document.getElementById('pag-area');
    if (el) el.innerHTML += `
      <button class="btn btn-wpp" onclick="confirmarWpp()" style="margin-top:8px">
        &#128740; Confirmar pelo WhatsApp
      </button>`;
  } finally {
    if (document.getElementById('btn-pagar')) {
      btn.disabled = false;
      btn.innerHTML = '<svg width="20" height="20" viewBox="0 0 48 48" fill="none"><circle cx="24" cy="24" r="24" fill="#fff" fill-opacity=".25"/><path d="M12 26c4-8 20-8 24 0" stroke="#fff" stroke-width="3" stroke-linecap="round"/></svg> Pagar com Mercado Pago';
    }
  }
}

function confirmarWpp() {
  if (!wppAdmin) { toast('WhatsApp da loja não encontrado', '#e74c3c'); return; }
  const sub    = items.reduce((s, i) => s + i.preco * i.qtd, 0);
  const total  = sub + (frete ? frete.preco : 0);
  const cliente = ORDER?.cliente || '';

  let msg = `Olá! ${cliente ? 'Sou ' + cliente + '. ' : ''}Preciso de ajuda com meu pedido da *Hearts Couro* 🤎`;
  if (items.length) {
    msg += `\n\n📦 *Itens:*\n`;
    items.forEach(i => { msg += `• ${i.qtd}x ${i.nome}${i.cor ? ' (' + i.cor + ')' : ''} — ${brl(i.preco * i.qtd)}\n`; });
    if (frete) msg += `\n🚚 *Entrega:* ${frete.servico}${frete.preco > 0 ? ' — ' + brl(frete.preco) : ' (Grátis)'}\n`;
    msg += `\n💰 *Total: ${brl(total)}*`;
  } else {
    msg += `\n\nRemovi todos os itens do pedido.`;
  }

  window.open(`https://wa.me/55${wppAdmin}?text=${encodeURIComponent(msg)}`, '_blank');
}

// ── boot ───────────────────────────────────────────────────
renderPage();
</script>
</body>
</html>
